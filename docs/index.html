<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="shortcut icon"
      href="./img/icons8-fondue-96.png"
      type="image/png"
    />

    <style>
      @import url("./style/index.css");
      @import url("./font/7segments.ttf");

      @font-face {
        font-family: "7seg";
        src: url("./font/7segments.ttf");
      }
    </style>

    <script src="./js/index.js"></script>

    <title>Fondue Timer</title>
  </head>
  <body onload="setup()">
    <nav>
      <span onclick="toggleNav(event)" class="menuButton">&equiv;</span>
      <p onclick="Edit.editing = !Edit.editing;" class="menuOption">Edit</p>
      <p onclick="clearStorage()" class="menuOption">Reset</p>
      <a target="_blank" href="https://www.github.com/holeinonestudios/Fondue-Timer" class="menuOption">Source</a>
      <a target="_blank" href="https://www.holeinonestudios.org" class="menuOption">Website</a>
    </nav>
    <main>
      <div
        title="Fork Container"
        id="forkContainer"
        class="optionContainer"
      ></div>
      <div
        title="Type Container"
        id="typeContainer"
        class="optionContainer"
      ></div>
      <div
        title="Timer Container"
        id="timerContainer"
        class="timerContainer"
      ></div>
    </main>

    <div id="editBg" class="editBg hidden">
      <form id="forkEdit" class="edit" action="">
        <label for="forkEdit_name">Fork Name:</label>
        <input type="text" id="forkEdit_name" placeholder="Fork Name" />
        <label for="forkEdit_icon">Fork Icon:</label>
        <input type="text" id="forkEdit_icon" placeholder="Fork Icon" />
        <label for="forkEdit_color">Fork Color:</label>
        <input type="color" id="forkEdit_color" placeholder="Fork Color" />
        <input type="submit" value="Submit" onsubmit="Edit.editConfirmFork()"/>
        <input type="button" value="Cancel" onclick="Edit.editCancel()"/>
      </form>
      <form id="typeEdit" class="edit" action="">
        <label for="typeEdit_name">Type Name:</label>
        <input type="text" id="typeEdit_name" placeholder="Type Name" />
        <label for="typeEdit_icon">Type Icon:</label>
        <input type="text" id="typeEdit_icon" placeholder="Type Icon" />
        <label for="typeEdit_time">Type Time:</label>
        <input type="text" id="typeEdit_time" placeholder="Type Time" />
        <input type="submit" value="Submit" onsubmit="Edit.editConfirmType()"/>
        <input type="button" value="Cancel" onclick="Edit.editCancel()"/>
      </form>
    </div>
  </body>
</html>
